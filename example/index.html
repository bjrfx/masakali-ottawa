<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Restaurant Menu</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
padding:40px;
}

h1{
text-align:center;
margin-bottom:40px;
}

.category{
margin-bottom:60px;
}

.category-title{
font-size:28px;
margin-bottom:20px;
border-left:5px solid #2ecc71;
padding-left:10px;
}

.menu-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
transition:0.2s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.content{
padding:15px;
}

.title{
font-weight:bold;
font-size:18px;
margin-bottom:6px;
}

.desc{
font-size:14px;
color:#666;
margin-bottom:10px;
}

.price{
font-weight:bold;
color:#27ae60;
}

</style>

</head>

<body>

<h1>Our Menu</h1>

<div id="menu"></div>

<script>

async function loadMenu(){

const res = await fetch("http://localhost:3000/menu");
const data = await res.json();

const menuDiv = document.getElementById("menu");

const categories = Object.values(data.categories);
const items = data.items;

categories.sort((a,b)=>a.sortOrder-b.sortOrder);

categories.forEach(category => {

if(!category.items || category.items.length===0) return;

let html = `
<div class="category">
<div class="category-title">${category.name}</div>
<div class="menu-grid">
`;

category.items.forEach(itemId => {

const item = items.find(i => i.id === itemId);

if(!item || !item.available) return;

const image = item.images?.[0]?.source || "";
const price = (item.price/100).toFixed(2);

html += `
<div class="card">

<img src="${image}">

<div class="content">

<div class="title">${item.name}</div>

<div class="desc">${item.description || ""}</div>

<div class="price">$${price}</div>

</div>

</div>
`;

});

html += `</div></div>`;

menuDiv.insertAdjacentHTML("beforeend",html);

});

}

loadMenu();

</script>

</body>
</html>
